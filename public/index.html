<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCash - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="login-body">
    <div class="background-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>CashCash</h1>
            </div>
            <h2>Bienvenue</h2>
            <p class="subtitle">Connectez-vous à votre espace employé</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="matricule">Matricule</label>
                    <input type="text" id="matricule" name="matricule" placeholder="Ex: 1001" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="error-message" id="login-error"></div>

                <button type="submit" class="btn-primary" id="btn-login">
                    <span class="btn-text">Se connecter</span>
                    <span class="spinner" style="display:none;"></span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Système de gestion des interventions sécurisé</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
